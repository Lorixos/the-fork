# Settings for Cloud Run
runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

# Custom build and run commands for plain Node.js Express server
env:
  - variable: FIREBASE_API_KEY
    secret: FIREBASE_API_KEY
  - variable: FIREBASE_AUTH_DOMAIN
    value: "byte-data-management.firebaseapp.com"
  - variable: FIREBASE_PROJECT_ID
    value: "byte-data-management"
  - variable: FIREBASE_APP_ID
    value: "1:1020883418437:web:62de498c617ae95c87522c"

scripts:
  buildCommand: "echo 'Building plain server'"
  runCommand: "node server.js"
